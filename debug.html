<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TML Debug</title>
</head>
<body>
<div style="font:14px monospace;padding:20px;background:#0a1f3c;color:#4dc8d0;min-height:100vh">
<h2 style="color:white">TechMedixLink — Debug</h2>
<div id="log"></div>
<div id="vue-test" style="margin-top:20px"></div>
</div>

<script>
function log(msg, ok) {
  const d = document.createElement('div');
  d.style.cssText = 'padding:4px 0;border-bottom:1px solid #1a3055';
  d.style.color = ok === false ? '#ff6b6b' : ok === true ? '#51cf66' : '#4dc8d0';
  d.innerHTML = (ok === true ? '✅ ' : ok === false ? '❌ ' : '⏳ ') + msg;
  document.getElementById('log').appendChild(d);
  console.log(msg);
}

log('Page loaded, waiting for scripts...');
</script>

<!-- Same CDN order as main app -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>

<script>
// Run AFTER all scripts
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    log('--- Checking state after app.js ran ---');

    // Check if TECHMEDIX_CONFIG loaded
    if (typeof TECHMEDIX_CONFIG === 'undefined') {
      log('TECHMEDIX_CONFIG is UNDEFINED - config.js not loaded!', false);
    } else {
      log('config.js loaded OK - URL: ' + TECHMEDIX_CONFIG.supabase.url.slice(8,35), true);
    }

    // Check if Vue loaded
    if (typeof Vue === 'undefined') {
      log('Vue is UNDEFINED - CDN failed!', false);
    } else {
      log('Vue loaded OK - version: ' + Vue.version, true);
    }

    // Check if supabase loaded
    if (typeof supabase === 'undefined') {
      log('Supabase is UNDEFINED - CDN failed!', false);
    } else {
      log('Supabase loaded OK', true);
    }

    // Check if Vue app mounted
    const appEl = document.getElementById('app');
    if (!appEl) {
      log('#app element NOT FOUND in DOM!', false);
    } else if (!appEl.__vue_app__) {
      log('#app found but Vue app NOT mounted on it', false);
    } else {
      log('Vue app IS mounted on #app ✓', true);

      // Check reactive state
      try {
        const proxy = appEl.__vue_app__._context.app._instance;
        log('Vue instance found', true);
      } catch(e) {
        log('Vue instance check failed: ' + e.message, false);
      }
    }

    // Try calling goTab directly
    try {
      const vueApp = document.getElementById('app').__vue_app__;
      if (vueApp) {
        log('Attempting goTab("browse")...', null);
        // This won't work directly but tells us if the app exists
        log('Vue app config: ' + JSON.stringify(Object.keys(vueApp.config || {})), true);
      }
    } catch(e) {
      log('goTab test error: ' + e.message, false);
    }

    // Check for any errors in console
    log('--- Check browser console for [Vue Error] or [Vue Warn] messages ---', null);
    log('--- Also check Network tab for failed requests ---', null);
  }, 2000); // Wait 2s for app to fully initialize
});
</script>
</body>
</html>
